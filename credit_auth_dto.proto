syntax = "proto3";
package dto;

option go_package = "gitlab.orayer.com/sunlogin/microservice/app-credit/service/dto";

message CreditAuthDispatch {

    int64 user_id = 1;

    // 被控设备
    int64 remote_id = 2;

    // 被控设备名称
    string remote_name = 3;

    // 主控ID
    string client_id = 4;

    // 主控设备名称
    string terminal_name = 5;

    // 主控设备平台
    string platform = 6;

    // 主控设备备注名称
    string mark = 7;

    // 申请ID Hash值
    string credit_auth_id = 8;

    // 状态 prohibit: 禁用 open: 开启授信  close: 关闭授信
    string credit_status = 9;

    // 是否是第一台自动授权
    bool is_first = 10;

    // 是否是APP授权
    bool is_app = 11;

    // 设备token
    string device_token = 12;

    // 远控SID
    string sid = 13;

    // 其他授信的被控信息
    repeated RemoteKeys remote_keys = 14;

    // 操作记录ID
    int64 work_id = 15;

    // IP地址信息
    NewsClientMessageText ip_location = 16;

    // 插件 monitor_wall-屏幕墙
    string plugin = 17;
}

// 授信被控信息
message RemoteKeys {
    // 被控设备ID
    int64 remote_id = 1;
    // 授信秘钥
    string credit_key = 2;
}

// 开启免密设置-请求数据
message CreditSettingDispatch {
    // 用户ID
    int64 user_id = 1;

    // 主控端ID（APP）
    string client_id = 2;

    // 设备ID
    int64 remote_id = 3;

    // 识别码
    string fastcode = 4;

    // 二维码-临时码
    string tempory_pwd = 5;

    // 移动端的device_token
    string device_token = 6;

    // 二维码状态 success: 成功 failed: 失败
    string qrcode_status = 7;

    // 设备名称
    string remote_name = 8;

    // 设备平台
    string platform = 9;

    // 设备备注名称
    string mark = 10;

    // 操作行为
    string action = 11;

    // 参数
    string params = 12;
}

// 3语种文案
message NewsClientMessageText {
    string cn = 1;
    string en = 2;
    string tw = 3;
}